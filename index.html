[data-theme="green"]{--bg:#e8f0e4;--card:#f2f7ef;--input:#d5e2cf;--hover:#c8d9c0;--accent:#2e7d32;--ok:#1b5e20;--err:#c62828;--warn:#f57f17;--txt:#1b3a1d;--txt2:#5a7a5c;--border:#b8ccb2;--pub-bg:#c8e6c9;--pub-fg:#2e7d32;--pri-bg:#ffcdd2;--pri-fg:#c62828;--lvl-bg:#a5d6a7;--lvl-fg:#1b5e20;--b1-bg:#e0f2f1;--b1-fg:#00695c;--b3-bg:#fff9c4;--b3-fg:#f57f17;--b4-bg:#c8e6c9;--b4-fg:#2e7d32;--arti-bg:#e0f2f1;--arti-fg:#00695c;--cat-voc-bg:#c8e6c9;--cat-voc-fg:#2e7d32;--cat-tech-bg:#e1bee7;--cat-tech-fg:#6a1b9a;--cat-hs-bg:#e0f2f1;--cat-hs-fg:#00695c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;transition:background .3s,color .3s}
.views{height:100vh;position:relative;overflow:hidden}
.view{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;transition:transform .3s ease,opacity .3s ease}
.view.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.view.slide-left{transform:translateX(-30%);opacity:0;pointer-events:none}
.topbar{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;transition:background .3s}
.topbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.topbar h1{font-size:16px;color:var(--accent);flex:1}
.theme-btns{display:flex;gap:3px}
.tbtn{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:.15s}
.tbtn:hover{transform:scale(1.2)}.tbtn.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.tbtn-dark{background:#0d1117}.tbtn-porcelain{background:linear-gradient(135deg,#f5f0eb 50%,#1a5276 50%)}.tbtn-green{background:#c8e6c9}
.search{width:100%;padding:8px 12px;background:var(--input);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:13px;outline:none;transition:.15s}
.search:focus{border-color:var(--accent)}
.filters{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.fb{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--input);color:var(--txt2);font-size:11px;cursor:pointer;transition:.15s}
.fb:hover,.fb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
select{padding:5px 8px;background:var(--input);border:1px solid var(--border);border-radius:5px;color:var(--txt);font-size:11px;outline:none;margin-top:4px;transition:.15s}
select:focus{border-color:var(--accent)}
.sbar{padding:8px 16px;font-size:11px;color:var(--txt2);background:var(--bg);display:flex;justify-content:space-between;position:sticky;top:132px;z-index:5}
.slist{padding:0 8px 80px}
.sitem{padding:12px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);margin-bottom:4px;background:var(--card);transition:.15s}
.sitem:hover{background:var(--hover);border-color:var(--accent)}
.sitem:active{transform:scale(.99)}
.sn{font-size:14px;font-weight:600;line-height:1.4}
.sm{font-size:11px;color:var(--txt2);margin-top:3px;display:flex;flex-wrap:wrap;align-items:center;gap:3px}
.b{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.bp{background:var(--pub-bg);color:var(--pub-fg)}.bm{background:var(--pri-bg);color:var(--pri-fg)}
.bl{background:var(--lvl-bg);color:var(--lvl-fg)}
.bb1{background:var(--b1-bg);color:var(--b1-fg)}.bb3{background:var(--b3-bg);color:var(--b3-fg)}.bb4{background:var(--b4-bg);color:var(--b4-fg)}
.bc-v{background:var(--cat-voc-bg);color:var(--cat-voc-fg)}.bc-t{background:var(--cat-tech-bg);color:var(--cat-tech-fg)}.bc-h{background:var(--cat-hs-bg);color:var(--cat-hs-fg)}
.arrow{color:var(--txt2);font-size:14px;margin-left:auto}
#detailView{background:var(--bg)}
.detail-header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);transition:background .3s}
.back-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;color:var(--accent);font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.15s}
.back-btn:hover{background:var(--hover)}
.back-btn svg{width:18px;height:18px;fill:currentColor}
.detail-body{padding:16px;max-width:960px;margin:0 auto;padding-bottom:80px}
.crd{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;transition:background .3s}
.crdh{padding:18px 20px;border-bottom:1px solid var(--border)}
.crdh h2{font-size:20px;margin-bottom:8px;line-height:1.4}
.bds{display:flex;flex-wrap:wrap;gap:4px}
.crdi{padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
.ii .l{color:var(--txt2);font-size:10px}.ii .v{color:var(--txt);font-size:13px;margin-top:2px}
.ii .v.missing{color:var(--txt2);font-style:italic;font-size:12px}
.msec{padding:14px 20px;border-top:1px solid var(--border)}
.msec h3{font-size:14px;color:var(--accent);margin-bottom:10px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.msec h3:hover{text-decoration:underline}
.mcard{background:var(--input);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;transition:.15s}
.mcard:hover{border-color:var(--accent)}
.mcard-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer}
.mcard-name{font-weight:600;font-size:13px;flex:1}
.mcard-code{font-family:monospace;font-size:11px;color:var(--accent);white-space:nowrap}
.mcard-bd{margin-top:8px;font-size:12px;display:none}
.mcard.open .mcard-bd{display:block}
.mcard-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.mcard-row:last-child{border:none}
.mcard-label{color:var(--txt2);font-size:11px}
.mcard-val{font-size:12px;text-align:right;max-width:60%}
.mcard-val.fee{color:var(--warn)}
.mcard-val.plan{color:var(--ok);font-weight:600}
.mcard-desc{margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:4px;font-size:11px;color:var(--txt2);line-height:1.5}
.mcard-arti{margin-top:4px;padding:6px 8px;background:var(--arti-bg);border-radius:4px;font-size:11px;color:var(--arti-fg);line-height:1.5}
.nom{padding:12px;color:var(--txt2);font-size:13px;background:var(--input);border-radius:6px;text-align:center}
.expand-all{font-size:11px;color:var(--accent);cursor:pointer;margin-left:8px;text-decoration:none}
.expand-all:hover{text-decoration:underline}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--hover);border-radius:3px}
@media(max-width:768px){.crdi{grid-template-columns:1fr}}
</style>
</head>

h+='<div class="mcard-bd">';
if(mj.program_type)h+=mr('办学形式',mj.program_type);
if(mj.duration)h+=mr('学制',mj.duration);
if(mj.total_plan)h+=mr('招生总计划',mj.total_plan+'人','plan');
if(mj.gz_plan)h+=mr('广州招生',mj.gz_plan+'人','plan');
if(mj.tuition)h+=mr('学费',mj.tuition,'fee');
if(mj.accommodation)h+=mr('住宿费',mj.accommodation,'fee');
if(mj.campus)h+=mr('校区',mj.campus);
if(mj.mode)h+=mr('学习形式',mj.mode);
if(mj.articulation)h+='<div class="mcard-arti">&#x1F391; 对接院校：'+esc(mj.articulation)+'</div>';
if(mj.description)h+='<div class="mcard-desc">'+esc(mj.description)+'</div>';
h+='</div></div>';
});
h+='</div></div>';
}else if(s.category==='普通高中'){
h+='<div class="crd"><div class="msec" style="border-top:none"><div class="nom">&#x1F4DA; 普通高中无专业列表</div></div></div>';
}
db.innerHTML=h;
lv.className='view slide-left';dv.className='view';dv.scrollTop=0;
}
function goBack(){document.getElementById('detailView').className='view hidden';document.getElementById('listView').className='view';}
function toggleCard(idx){var el=document.getElementById('mc'+idx);if(el)el.classList.toggle('open');}
function toggleAll(e,el){e.stopPropagation();var cards=document.querySelectorAll('.mcard');var allOpen=Array.from(cards).every(function(c){return c.classList.contains('open')});cards.forEach(function(c){if(allOpen)c.classList.remove('open');else c.classList.add('open');});el.textContent=allOpen?'全部展开':'全部收起';}
function mr(l,v,cls){return'<div class="mcard-row"><span class="mcard-label">'+l+'</span><span class="mcard-val'+(cls?' '+cls:'')+'">'+esc(v)+'</span></div>';}
function ii(l,v){if(!v||v==='详见报考指南原文')return'<div class="ii"><div class="l">'+l+'</div><div class="v missing">详见报考指南原文</div></div>';return'<div class="ii"><div class="l">'+l+'</div><div class="v">'+esc(String(v))+'</div></div>';}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
